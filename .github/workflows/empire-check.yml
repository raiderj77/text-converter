name: Empire Compliance Check

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  # ────────────────────────────────────────────────────────────────
  # Job 1 — Build (runs in parallel with compliance)
  # ────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install and build
        run: |
          npm ci
          npm run build

  # ────────────────────────────────────────────────────────────────
  # Job 2 — Empire compliance gates (no Node required)
  # ────────────────────────────────────────────────────────────────
  compliance:
    name: Compliance Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── Check 2: Required public files ──────────────────────────
      - name: Required public files exist
        run: |
          # Files may live in public/ (Next.js layout) OR at repo root (flat static sites).
          # We accept either location.
          FAILED=0
          for STEM in ads robots llms; do
            if [ -f "public/${STEM}.txt" ]; then
              echo "✓ public/${STEM}.txt"
            elif [ -f "${STEM}.txt" ]; then
              echo "✓ ${STEM}.txt (root)"
            else
              echo "::error::MISSING — ${STEM}.txt required at public/${STEM}.txt or ./${STEM}.txt. Empire Standard requires this on every site."
              FAILED=1
            fi
          done
          [ "$FAILED" -eq 0 ] || exit 1

      # ── Check 3: AdSense publisher ID ───────────────────────────
      - name: AdSense publisher ID in ads.txt
        run: |
          ADS_FILE=""
          if [ -f public/ads.txt ]; then ADS_FILE="public/ads.txt"
          elif [ -f ads.txt ]; then ADS_FILE="ads.txt"
          fi
          if [ -z "$ADS_FILE" ]; then
            echo "::warning::Skipping AdSense check — ads.txt missing (caught above)"
            exit 0
          fi
          if ! grep -qF "pub-7171402107622932" "$ADS_FILE"; then
            echo "::error file=$ADS_FILE::ADSENSE FAIL — $ADS_FILE must contain 'pub-7171402107622932'."
            cat "$ADS_FILE"
            exit 1
          fi
          echo "✓ AdSense publisher ID confirmed in $ADS_FILE"

      # ── Check 4: AI crawler rules in robots.txt ─────────────────
      - name: AI crawler rules in robots.txt
        run: |
          ROBOTS_FILE=""
          if [ -f public/robots.txt ]; then ROBOTS_FILE="public/robots.txt"
          elif [ -f robots.txt ]; then ROBOTS_FILE="robots.txt"
          fi
          if [ -z "$ROBOTS_FILE" ]; then
            echo "::warning::Skipping robots.txt check — file missing (caught above)"
            exit 0
          fi
          FAILED=0
          for BOT in GPTBot ClaudeBot PerplexityBot Google-Extended; do
            if ! grep -q "^User-agent: ${BOT}" "$ROBOTS_FILE"; then
              echo "::error file=$ROBOTS_FILE::ROBOTS FAIL — Missing 'User-agent: ${BOT}'."
              FAILED=1
            else
              echo "✓ User-agent: ${BOT}"
            fi
          done
          [ "$FAILED" -eq 0 ] || exit 1

      # ── Check 5: IndexNow key file ───────────────────────────────
      - name: IndexNow key file exists
        run: |
          KEY_FILE=""
          # Search public/ first, then repo root.
          for SEARCH in public . ; do
            while IFS= read -r F; do
              STEM=$(basename "$F" .txt)
              if [[ "$STEM" =~ ^[0-9a-f]{32}$ ]]; then
                KEY_FILE="$F"
                break 2
              fi
            done < <(find "$SEARCH" -maxdepth 1 -name "*.txt" 2>/dev/null || true)
          done
          if [ -z "$KEY_FILE" ]; then
            echo "::error::INDEXNOW FAIL — No IndexNow key file found. Expected a 32-hex-char .txt file at public/ or repo root."
            exit 1
          fi
          echo "✓ IndexNow key file: $KEY_FILE"

      # ── Check 6: Author byline policy (updated 2026-05-11) ─────
      # Policy: "Jason Ramirez" + CADC-II credential is the canonical author
      # entity across the entire Empire portfolio. One author = stronger EEAT
      # and AI-citation signal than 11 anonymous publishers. This check now
      # WARNS if the name is missing rather than failing if present.
      - name: Author byline present (informational)
        env:
          REPO: ${{ github.repository }}
        run: |
          SEARCH_DIRS=()
          for DIR in src app components lib hooks types config public content; do
            [ -d "$DIR" ] && SEARCH_DIRS+=("$DIR")
          done

          if [ "${#SEARCH_DIRS[@]}" -eq 0 ]; then
            echo "ℹ No standard source directories — skipping byline check"
            exit 0
          fi

          MATCHES=$(grep -rl "Jason Ramirez" "${SEARCH_DIRS[@]}" 2>/dev/null | wc -l || echo 0)
          if [ "$MATCHES" -eq 0 ]; then
            echo "::warning::No 'Jason Ramirez' byline found. Per portfolio policy, author byline + CADC-II credential should appear on author pages and in post frontmatter for EEAT."
          else
            echo "✓ Author byline present in $MATCHES file(s) (portfolio policy: name + credential everywhere)"
          fi
